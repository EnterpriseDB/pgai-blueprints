<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="ar" markerWidth="14" markerHeight="14" refX="11" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1400" height="700" fill="#ffffff"/>

  <text x="700" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Deploying stacks via Colima on your laptop</text>
  <text x="700" y="74" text-anchor="middle" font-size="16" fill="#64748b">Same flow as Docker Desktop, but the daemon runs inside a Colima VM (free, MIT-licensed alternative)</text>

  <rect x="60" y="110" width="1280" height="490" rx="14" fill="#f0f9ff" stroke="#0284c7" stroke-width="3"/>
  <text x="90" y="148" font-size="20" font-weight="700" fill="#075985">YOUR MAC</text>
  <text x="90" y="172" font-size="13" fill="#075985">macOS host · Colima installed · port forwarding to localhost</text>

  <rect x="100" y="220" width="180" height="170" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="190" y="258" text-anchor="middle" font-size="44" font-weight="700" fill="#7c3aed">1</text>
  <text x="190" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">You</text>
  <text x="190" y="328" text-anchor="middle" font-size="13" fill="#475569">browser</text>
  <text x="190" y="358" text-anchor="middle" font-size="13" fill="#475569">click "Deploy"</text>

  <line x1="290" y1="305" x2="340" y2="305" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="350" y="220" width="180" height="170" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="440" y="258" text-anchor="middle" font-size="44" font-weight="700" fill="#2563eb">2</text>
  <text x="440" y="300" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">diab agent</text>
  <text x="440" y="328" text-anchor="middle" font-size="13" fill="#475569">reads compose</text>
  <text x="440" y="358" text-anchor="middle" font-size="13" fill="#475569">runs docker compose up</text>

  <line x1="540" y1="305" x2="600" y2="305" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="610" y="195" width="700" height="240" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="630" y="225" font-size="17" font-weight="700" fill="#92400e">COLIMA VM (lightweight Linux)</text>
  <text x="630" y="245" font-size="12" fill="#92400e">size it via: colima start --cpu N --memory N --disk N</text>

  <rect x="640" y="260" width="180" height="160" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="730" y="298" text-anchor="middle" font-size="44" font-weight="700" fill="#d97706">3</text>
  <text x="730" y="340" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Docker daemon</text>
  <text x="730" y="365" text-anchor="middle" font-size="13" fill="#475569">builds + pulls images</text>
  <text x="730" y="389" text-anchor="middle" font-size="13" fill="#475569">starts containers</text>

  <line x1="830" y1="340" x2="890" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="900" y="260" width="380" height="160" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="3"/>
  <text x="1090" y="298" text-anchor="middle" font-size="44" font-weight="700" fill="#059669">4</text>
  <text x="1090" y="340" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Stack containers</text>
  <text x="1090" y="365" text-anchor="middle" font-size="13" fill="#475569">whatever services your compose defines</text>
  <text x="1090" y="389" text-anchor="middle" font-size="13" fill="#475569">Colima forwards their ports → Mac localhost</text>

  <path d="M 1090 435 L 1090 480 L 190 480 L 190 395" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#ar)"/>
  <text x="640" y="475" text-anchor="middle" font-size="15" font-weight="600" fill="#7c3aed">5. You open service URLs in browser (Colima forwarded them)</text>
  <text x="640" y="497" text-anchor="middle" font-size="12" fill="#7c3aed">http://127.0.0.1:&lt;port&gt; — whichever ports the compose exposes</text>

  <rect x="100" y="525" width="1210" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="120" y="548" font-size="13" font-weight="700" fill="#854d0e">Storage &amp; auth</text>
  <text x="120" y="568" font-size="12" fill="#1e293b">Volumes live in Colima VM disk. Bind mounts work transparently (Colima auto-mounts $HOME). Same URLs as Docker Desktop.</text>

  <text x="700" y="655" text-anchor="middle" font-size="14" fill="#475569">Same compose flow as Docker Desktop · One extra VM hop · Free alternative.</text>
  <text x="700" y="680" text-anchor="middle" font-size="13" font-style="italic" fill="#94a3b8">Start Colima before deploy. Size memory/CPU according to the stack's needs.</text>
</svg>
