<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Stack deploys to Northflank (BYOC)</text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#555">DIAB calls NF API &#183; NF schedules pods on your AWS &#183; status visible on NF Console</text>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Layer 1: Your laptop                                                -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect x="380" y="100" width="240" height="70" rx="6" fill="#fafafa" stroke="#222" stroke-width="1.5"/>
  <text x="500" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#666" letter-spacing="0.8">YOUR LAPTOP</text>
  <text x="500" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#111">DIAB agent</text>
  <text x="500" y="163" text-anchor="middle" font-size="11" fill="#555">parses compose &#8594; calls NF API</text>

  <!-- Arrow down: HTTPS -->
  <line x1="500" y1="170" x2="500" y2="210" stroke="#222" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="540" y="195" font-size="11" fill="#555">HTTPS REST</text>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Layer 2: Northflank SaaS (control plane)                            -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect x="180" y="220" width="640" height="100" rx="6" fill="#fafafa" stroke="#222" stroke-width="1.5"/>
  <text x="200" y="245" font-size="11" font-weight="700" fill="#666" letter-spacing="0.8">NORTHFLANK CONTROL PLANE</text>
  <text x="500" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#111">stores intent &#183; orchestrates &#183; shows status on NF Console</text>
  <text x="500" y="298" text-anchor="middle" font-size="11" fill="#555">creates K8s Deployments / Jobs / Secrets in your cluster &#183; routes public URLs</text>

  <!-- Arrow down -->
  <line x1="500" y1="320" x2="500" y2="360" stroke="#222" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="540" y="345" font-size="11" fill="#555">reconciles via NF agent inside your cluster</text>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Layer 3: Your AWS                                                   -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect x="60" y="370" width="640" height="160" rx="6" fill="#fafafa" stroke="#222" stroke-width="1.5"/>
  <text x="80" y="395" font-size="11" font-weight="700" fill="#666" letter-spacing="0.8">YOUR AWS &#183; EKS CLUSTER (BYOC)</text>

  <rect x="90" y="410" width="280" height="100" rx="4" fill="#ffffff" stroke="#222" stroke-width="1"/>
  <text x="230" y="434" text-anchor="middle" font-size="13" font-weight="600" fill="#111">service pods</text>
  <text x="230" y="450" text-anchor="middle" font-size="11" fill="#555">long-running (e.g. pgd, kafka, app)</text>
  <text x="230" y="466" text-anchor="middle" font-size="11" fill="#555">env from /secrets &#183; URLs from NF</text>
  <text x="230" y="492" text-anchor="middle" font-size="10" font-style="italic" fill="#777">visible + controlled from NF Console</text>

  <rect x="390" y="410" width="280" height="100" rx="4" fill="#ffffff" stroke="#222" stroke-width="1"/>
  <text x="530" y="434" text-anchor="middle" font-size="13" font-weight="600" fill="#111">init job pods</text>
  <text x="530" y="450" text-anchor="middle" font-size="11" fill="#555">one-shot (DB seed, schema, buckets)</text>
  <text x="530" y="466" text-anchor="middle" font-size="11" fill="#555">foundation auto-run &#183; use-case on click</text>
  <text x="530" y="492" text-anchor="middle" font-size="10" font-style="italic" fill="#777">visible + controlled from NF Console</text>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Layer 3 sidekick: Container Registry                                -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect x="740" y="370" width="200" height="160" rx="6" fill="#fafafa" stroke="#222" stroke-width="1.5"/>
  <text x="760" y="395" font-size="11" font-weight="700" fill="#666" letter-spacing="0.8">REGISTRY</text>
  <text x="840" y="425" text-anchor="middle" font-size="13" font-weight="600" fill="#111">GHCR / ECR /</text>
  <text x="840" y="442" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Docker Hub</text>
  <text x="840" y="475" text-anchor="middle" font-size="10" fill="#555">pods pull images here</text>
  <text x="840" y="490" text-anchor="middle" font-size="10" fill="#555">private &#8594; with NF-stored cred</text>
  <text x="840" y="505" text-anchor="middle" font-size="10" fill="#555">public &#8594; no cred needed</text>

  <!-- Arrow: pods pull from registry. kubelet pulls; NF provides the pull
       secret so the credential isn't visible to the pod itself. -->
  <line x1="700" y1="460" x2="740" y2="460" stroke="#222" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="720" y="450" text-anchor="middle" font-size="10" fill="#555">pull</text>

  <!-- Side note (small, no box) -->
  <text x="500" y="563" text-anchor="middle" font-size="11" fill="#555">Per-stack work: just list the stack's images in <tspan font-family="monospace" fill="#111">GHCR_IMAGES</tspan> (private ones).
  Public images use what compose says.</text>
  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#555">Everything else &#8212; env, URLs, jobs, scheduling &#8212; is generic NF translation, same for any stack.</text>
</svg>
