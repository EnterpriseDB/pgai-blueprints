# For demonstration purposes only.

worker_processes auto;
events { worker_connections 1024; }

http {
    # Strip iframe-blocking headers and proxy to upstream services
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Docker embedded DNS — lets proxy_pass to optional/profile-gated upstreams
    # (like airflow-webserver) defer name resolution until request time.
    # Without this, nginx crash-loops at startup when an upstream container
    # doesn't exist yet (e.g. airflow profile off).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Jupyter (8888 -> 8890)
    server {
        listen 8890;
        location / {
            proxy_pass http://jupyter:8888;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # MLflow (5000 -> 5010)
    server {
        listen 5010;
        location / {
            proxy_pass http://mlflow:5000;
        }
    }

    # Metabase (3000 -> 3010)
    server {
        listen 3010;
        location / {
            proxy_pass http://metabase:3000;
        }
    }

    # LangFlow (7860 -> 7870)
    server {
        listen 7870;
        location / {
            proxy_pass http://langflow:7860;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # MinIO Console (9001 -> 9011)
    server {
        listen 9011;
        location / {
            proxy_pass http://minio:9001;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ClickHouse HTTP (8123 -> 8130)
    server {
        listen 8130;
        location / {
            proxy_pass http://clickhouse:8123;
        }
    }

    # RisingWave Dashboard (5691 -> 5700)
    server {
        listen 5700;
        location / {
            proxy_pass http://risingwave:5691;
        }
    }

    # Lakekeeper (8181 -> 8190)
    server {
        listen 8190;
        location / {
            proxy_pass http://lakekeeper:8181;
        }
    }

    # Airflow (8080 -> 8898). Airflow is profile-gated; use a variable upstream
    # so nginx doesn't try to resolve "airflow-webserver" at startup (which
    # would crash-loop nginx when the airflow profile is off). The variable +
    # resolver pattern defers DNS to per-request, returning a clean 502 when
    # the container is down instead of taking nginx itself out.
    server {
        listen 8898;
        location / {
            set $airflow_upstream "airflow-webserver";
            proxy_pass http://$airflow_upstream:8080;
            # Override the global Host header to pin Airflow's request.host to
            # the external URL it should generate redirects with. Without this,
            # internal redirects (e.g. Trigger DAG) bounce to the container
            # service name and the browser can't resolve it.
            proxy_set_header Host "127.0.0.1:8888";
            proxy_set_header X-Forwarded-Host "127.0.0.1:8888";
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Port 8888;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
