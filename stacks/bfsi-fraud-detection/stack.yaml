# For demonstration purposes only.

name: "Core Banking Fraud Audit"
version: "1.0"
card: ml-inference
card_label: "ML Inference"
industry: bfsi
industry_case: "Fraud Detection"
deploy_targets: [laptop, northflank]
description: |
  Progressive deployment stack for real-time ML fraud detection.

  Profiles:
  - Foundation (default): pgd, kafka, risingwave, clickhouse, minio, lakekeeper, jupyter, mlflow, langflow
  - oltp: Bank App for transaction processing
  - ml: ML inference engines (Kafka, PGAA, RisingWave, ClickHouse paths)
  - genai: LangFlow flow configuration and MCP setup

components:
# === FOUNDATION (starts by default) ===
- name: pgd
  type: database
  profile: foundation
  image: custom (EDB PGD + PGAA + AIDB)
  description: EDB Postgres Distributed — OLTP with AI extensions
- name: langflow
  type: ai-agent
  profile: foundation
  image: langflowai/langflow:latest
  description: LangFlow visual agent builder
- name: risingwave
  type: streaming
  profile: foundation
  image: risingwavelabs/risingwave:latest
  description: Streaming SQL — Kafka consumer + MVs
- name: kafka
  type: streaming
  profile: foundation
  image: apache/kafka:latest
  description: Event streaming (KRaft, no Zookeeper)
- name: kafka-connect
  type: cdc
  profile: foundation
  image: debezium/connect:2.4
  description: Debezium CDC — PG WAL to Kafka
- name: clickhouse
  type: database
  profile: foundation
  image: clickhouse/clickhouse-server:latest
  description: ClickHouse OLAP — batch analytics
- name: jupyter
  type: ml
  profile: foundation
  image: jupyter/datascience-notebook:latest
  description: ML model training environment
- name: minio
  type: storage
  profile: foundation
  image: minio/minio:latest
  description: S3-compatible storage (Iceberg + fraud rule docs)
- name: lakekeeper
  type: catalog
  profile: foundation
  image: quay.io/lakekeeper/catalog:latest
  description: Iceberg REST Catalog for PGAA
- name: mlflow
  type: ml-platform
  profile: foundation
  image: ghcr.io/mlflow/mlflow:v2.18.0
  description: MLFlow experiment tracking and model registry
- name: metabase
  type: analytics
  profile: foundation
  image: metabase/metabase:latest
  description: Metabase analytics dashboards — fraud detection metrics

# === OLTP PROFILE (--profile oltp) ===
- name: app
  type: application
  profile: oltp
  image: custom (Node.js)
  description: Core banking simulator UI — 8 tabs including Fraud Audit

# === ML PROFILE (--profile ml) ===
- name: kafka-feature-materializer
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: Real-time feature enrichment from Kafka
- name: ml-inference-kafka
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: Event-driven XGBoost fraud scoring (<100ms TTDF)
- name: ml-inference-risingwave
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: XGBoost fraud scoring from RW MVs (~4200ms TTDF)
- name: ml-inference-clickhouse
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: XGBoost fraud scoring from CH (~3000ms TTDF)
- name: ml-inference-pgaa
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: XGBoost fraud scoring from PGAA/Iceberg (~300ms TTDF)
- name: fraud-alert
  type: ml
  profile: ml
  image: bfsi-ml-inference:latest
  description: Fraud alert monitor — all paths

# === GENAI PROFILE (--profile genai) ===
- name: langflow-init
  type: init
  profile: genai
  image: bfsi-ml-inference:latest
  description: Configures LangFlow flows and MCP server

